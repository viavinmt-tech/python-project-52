{% extends 'base.html' %}

{% block content %}
<div class="ms-3">
    <h1 class="fw-normal mb-4">Изменение задачи</h1>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_name" class="form-label fw-normal text-dark mb-1">Имя</label>
            <input type="text" name="name" id="id_name" class="form-control w-50" value="{{ form.name.value|default:task.name }}" required>
            {% if form.name.errors %}
                <div class="text-danger small">
                    {% for error in form.name.errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}
        </div>
        <div class="mb-3">
            <label for="id_description" class="form-label fw-normal text-dark mb-1">Описание</label>
            <textarea name="description" id="id_description" class="form-control w-50" rows="4">{{ form.description.value|default:task.description }}</textarea>
        </div>
        <div class="mb-3">
            <label for="id_status" class="form-label fw-normal text-dark mb-1">Статус</label>
            <select name="status" id="id_status" class="form-select w-50" required>
                <option value="">---------</option>
                {% for status in form.fields.status.queryset %}
                <option value="{{ status.pk }}" {% if form.status.value|stringformat:"s" == status.pk|stringformat:"s" or task.status.pk == status.pk %}selected{% endif %}>{{ status.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="id_executor" class="form-label fw-normal text-dark mb-1">Исполнитель</label>
            <select name="executor" id="id_executor" class="form-select w-50">
                <option value="">---------</option>
                {% for user in form.fields.executor.queryset %}
                <option value="{{ user.pk }}" {% if form.executor.value|stringformat:"s" == user.pk|stringformat:"s" or task.executor and task.executor.pk == user.pk %}selected{% endif %}>{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="id_labels" class="form-label fw-normal text-dark mb-1">Метки</label>
            <select name="labels" id="id_labels" class="form-select w-50" multiple>
                {% for label in form.fields.labels.queryset %}
                <option value="{{ label.pk }}" {% if label in task.labels.all %}selected{% endif %}>{{ label.name }}</option>
                {% endfor %}
            </select>
            <small class="text-muted">Удерживайте Ctrl для выбора нескольких меток</small>
        </div>
        <button type="submit" class="btn btn-primary">Изменить</button>
    </form>
</div>
{% endblock %}
