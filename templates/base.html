<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Менеджер задач{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center gap-4">
                <a class="navbar-brand fw-semibold text-dark p-0" href="{% url 'home' %}">Менеджер задач</a>
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item">
                        <a class="nav-link text-secondary px-0" href="{% url 'users' %}">Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary px-0" href="{% url 'login' %}">Вход</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary px-0" href="{% url 'register' %}">Регистрация</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="mt-5 px-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="mt-auto pt-4">
        <div class="container-fluid px-4">
            <hr class="border-secondary-subtle m-0">
            <div class="py-3 text-center">
                <a href="https://ru.hexlet.io/my" class="text-primary">Hexlet</a>
            </div>
        </div>
    </footer>
</body>
</html>
