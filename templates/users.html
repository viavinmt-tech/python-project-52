{% extends 'base.html' %}

{% block content %}
<div class="ms-3">
    <h1 class="fw-normal mb-4">Пользователи</h1>
    
    
    <table class="table table-striped">
        <thead>
            <tr>
                <th class="fw-normal">ID</th>
                <th class="fw-normal">Имя пользователя</th>
                <th class="fw-normal">Полное имя</th>
                <th class="fw-normal">Дата создания</th>
                <th class="fw-normal"></th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.fullName }}</td>
                <td>{{ user.date_joined|date:"d.m.Y H:i" }}</td>
                <td>
                    <div class="d-flex flex-column">
                        <a href="{% url 'user_update' user.pk %}" class="text-primary text-decoration-underline">Изменить</a>
                        <a href="{% url 'user_delete' user.pk %}" class="text-primary text-decoration-underline">Удалить</a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">Нет пользователей</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
