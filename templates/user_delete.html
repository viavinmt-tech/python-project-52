{% extends 'base.html' %}

{% block content %}
<div class="ms-3">
    <h1 class="fw-normal mb-4">Удаление пользователя</h1>
    <p>Вы уверены, что хотите удалить {{ user.username }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'users' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
